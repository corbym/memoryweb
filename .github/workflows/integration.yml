name: Integration Tests (Ollama)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: ollama serve &

      - name: Wait for Ollama to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434 > /dev/null 2>&1; then
              echo "Ollama is ready"
              exit 0
            fi
            echo "Waiting for Ollama... ($i/30)"
            sleep 1
          done
          echo "Ollama did not become ready in time"
          exit 1

      - name: Pull snowflake-arctic-embed model
        run: ollama pull snowflake-arctic-embed

      - name: Install gcc and libc-dev (required for CGO/sqlite-vec)
        run: sudo apt-get install -y gcc libc-dev

      - name: Verify semantic tests exist
        # go test exits 0 even when no tests match the -run pattern.
        # This step catches accidental deletion before spending 2+ minutes on Ollama setup.
        run: |
          count=$(CGO_ENABLED=1 go test -list 'TestSearchSemantic_' ./tools/... | grep -c '^TestSearchSemantic_' || true)
          if [ "$count" -eq 0 ]; then
            echo "ERROR: no TestSearchSemantic_ tests found — they may have been deleted"
            exit 1
          fi
          echo "OK: found $count TestSearchSemantic_ test(s)"

      - name: Run semantic integration tests
        run: CGO_ENABLED=1 go test ./... -run TestSearchSemantic_ -v -timeout 120s

