name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
          - os: windows-latest
            goos: windows
            goarch: amd64
            cc: gcc
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gcc (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Set up sqlite3 headers for Linux CGO build
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod download
          SQLITE3_DIR=$(go list -m -json github.com/mattn/go-sqlite3 | grep '"Dir"' | sed 's/.*: "\(.*\)",\?/\1/')
          mkdir -p /tmp/cgo-headers
          cp "${SQLITE3_DIR}/sqlite3-binding.h" /tmp/cgo-headers/sqlite3.h
          echo "CGO_CFLAGS=-I/tmp/cgo-headers" >> "$GITHUB_ENV"

      - name: Install gcc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install mingw --no-progress

      - name: Set up sqlite3 headers for Windows CGO build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          go mod download
          $sqlite3Dir = go list -m -json github.com/mattn/go-sqlite3 | ConvertFrom-Json | Select-Object -ExpandProperty Dir
          $headersDir = New-Item -ItemType Directory -Path (Join-Path $env:TEMP "cgo-headers") -Force
          Copy-Item (Join-Path $sqlite3Dir "sqlite3-binding.h") -Destination (Join-Path $headersDir.FullName "sqlite3.h")
          $posixPath = $headersDir.FullName.Replace('\', '/')
          Add-Content $env:GITHUB_ENV "CGO_CFLAGS=-I$posixPath"

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: go build -ldflags="-s -w" -o bin/memoryweb_${{ matrix.goos }}_${{ matrix.goarch }}/memoryweb${{ matrix.ext }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: bin/
          merge-multiple: true

      - name: Create archives and checksums
        run: |
          set -e
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          for dir in bin/memoryweb_*/; do
            name=$(basename "$dir")
            suffix="${name#memoryweb_}"
            goos="${suffix%%_*}"
            goarch="${suffix#*_}"
            if [ "$goos" = "windows" ]; then
              (cd bin && zip -r "../dist/memoryweb_${VERSION}_${goos}_${goarch}.zip" "$name/")
            else
              tar -czf "dist/memoryweb_${VERSION}_${goos}_${goarch}.tar.gz" -C bin "$name"
            fi
          done
          cd dist && sha256sum ./* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
