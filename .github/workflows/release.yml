name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
          - os: windows-latest
            goos: windows
            goarch: amd64
            cc: gcc
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gcc (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Install gcc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install mingw --no-progress

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: go build -ldflags="-s -w" -o bin/memoryweb_${{ matrix.goos }}_${{ matrix.goarch }}/memoryweb${{ matrix.ext }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: bin/
          merge-multiple: true

      - name: Create archives and checksums
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              dir="bin/memoryweb_${goos}_${goarch}"
              if [ -d "$dir" ]; then
                tar -czf "dist/memoryweb_${VERSION}_${goos}_${goarch}.tar.gz" -C bin "memoryweb_${goos}_${goarch}"
              fi
            done
          done
          if [ -d "bin/memoryweb_windows_amd64" ]; then
            (cd bin && zip -r "../dist/memoryweb_${VERSION}_windows_amd64.zip" memoryweb_windows_amd64/)
          fi
          cd dist && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
