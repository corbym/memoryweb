name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to rebuild and release (e.g. v1.4.2)'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
          - os: windows-latest
            goos: windows
            goarch: amd64
            cc: gcc
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gcc (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Set up sqlite3 headers for Linux CGO build
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod download
          SQLITE3_DIR=$(go list -m -json github.com/mattn/go-sqlite3 | grep '"Dir"' | sed 's/.*: "\(.*\)",\?/\1/')
          mkdir -p /tmp/cgo-headers
          cp "${SQLITE3_DIR}/sqlite3-binding.h" /tmp/cgo-headers/sqlite3.h
          echo "CGO_CFLAGS=-I/tmp/cgo-headers" >> "$GITHUB_ENV"

      - name: Install gcc (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install mingw --no-progress

      - name: Set up sqlite3 headers for Windows CGO build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          go mod download
          $sqlite3Dir = go list -m -json github.com/mattn/go-sqlite3 | ConvertFrom-Json | Select-Object -ExpandProperty Dir
          $headersDir = New-Item -ItemType Directory -Path (Join-Path $env:TEMP "cgo-headers") -Force
          Copy-Item (Join-Path $sqlite3Dir "sqlite3-binding.h") -Destination (Join-Path $headersDir.FullName "sqlite3.h")
          $posixPath = $headersDir.FullName.Replace('\', '/')
          Add-Content $env:GITHUB_ENV "CGO_CFLAGS=-I$posixPath"

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: go build -ldflags="-s -w -X main.Version=${{ inputs.tag || github.ref_name }}" -o bin/memoryweb_${{ matrix.goos }}_${{ matrix.goarch }}/memoryweb${{ matrix.ext }} .

      - name: Sign Windows binary
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "::warning::WINDOWS_CERTIFICATE secret not set; skipping code signing."
            exit 0
          }
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:TEMP "signing_cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          try {
            $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Recurse -Filter "signtool.exe" |
              Where-Object { $_.FullName -match "x64" } |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
            if (-not $signtool) { throw "signtool.exe not found" }
            Write-Host "Using signtool: $signtool"
            & $signtool sign `
              /fd SHA256 `
              /td SHA256 `
              /tr http://timestamp.digicert.com `
              /f $certPath `
              /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              "bin\memoryweb_windows_amd64\memoryweb.exe"
            if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }
          } finally {
            Remove-Item $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Fetch hooks from main if not present at tag
        run: |
          if [ ! -d hooks ] || [ -z "$(find hooks -maxdepth 1 -name '*.sh' 2>/dev/null)" ]; then
            git fetch origin main
            git checkout origin/main -- hooks/
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: bin/
          merge-multiple: true

      - name: Create archives and checksums
        run: |
          set -e
          mkdir -p dist
          VERSION="${{ inputs.tag || github.ref_name }}"
          for dir in bin/memoryweb_*/; do
            name=$(basename "$dir")
            suffix="${name#memoryweb_}"
            goos="${suffix%%_*}"
            goarch="${suffix#*_}"
            cp -r hooks "bin/${name}/"
            if [ "$goos" = "windows" ]; then
              (cd bin && zip -r "../dist/memoryweb_${VERSION}_${goos}_${goarch}.zip" "$name/")
            else
              tar -czf "dist/memoryweb_${VERSION}_${goos}_${goarch}.tar.gz" -C bin "$name"
            fi
          done
          cd dist && sha256sum ./* > checksums.txt

      - name: Delete existing release assets (backfill mode)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          gh release view "$TAG" --json assets --jq '.assets[].name' | while read -r asset; do
            echo "Deleting existing asset: $asset"
            gh release delete-asset "$TAG" "$asset" --yes || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          gh workflow run update-homebrew.yml \
            --repo corbym/memoryweb \
            -f tag="${VERSION}"
